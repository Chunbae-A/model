<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
<rect width="1500" height="860" fill="#f5f7fb"/>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}</style>
<text x="54" y="58" font-size="30" font-weight="800" fill="#111827">H2. Post-rainfall nutrient inflow</text>
<text x="54" y="88" font-size="15" fill="#64748b">Lagged rainfall windows, inflow, turbidity, and nitrogen-fixing taxa.</text>
<rect x="56" y="120" width="1388" height="660" rx="14" fill="#ffffff" stroke="#d7dde8"/>
<rect x="56" y="120" width="12" height="660" rx="6" fill="#2E7D5B"/>
<rect x="96" y="150" width="150" height="38" rx="19" fill="#2E7D5B" fill-opacity="0.14"/>
<text x="171" y="175" text-anchor="middle" font-size="14" font-weight="900" fill="#2E7D5B">Supported</text>
<text x="96" y="215" font-size="15" fill="#334155">
<tspan x="96" dy="0">This scenario tests whether rainfall and inflow create bloom</tspan>
<tspan x="96" dy="21">conditions after a lag rather than immediately.</tspan>
</text>
<text x="96" y="300" font-size="18" font-weight="900" fill="#111827">Lag-window risk after rainfall</text>
<line x1="105" y1="635" x2="825" y2="635" stroke="#cbd5e1"/>
<rect x="143" y="467.0" width="82" height="168.0" rx="7" fill="#2E7D5B"/>
<text x="184.0" y="457.0" text-anchor="middle" font-size="13" font-weight="900" fill="#111827">34.3%</text>
<text x="137" y="667" font-size="12" fill="#475569">
<tspan x="137" dy="0">3-day rain</tspan>
</text>
<rect x="268" y="469.7" width="82" height="165.3" rx="7" fill="#2E7D5B"/>
<text x="309.0" y="459.7" text-anchor="middle" font-size="13" font-weight="900" fill="#111827">33.8%</text>
<text x="262" y="667" font-size="12" fill="#475569">
<tspan x="262" dy="0">7-day rain</tspan>
</text>
<rect x="393" y="439.8" width="82" height="195.2" rx="7" fill="#2E7D5B"/>
<text x="434.0" y="429.8" text-anchor="middle" font-size="13" font-weight="900" fill="#111827">39.9%</text>
<text x="387" y="667" font-size="12" fill="#475569">
<tspan x="387" dy="0">14-day rain</tspan>
</text>
<rect x="518" y="470.1" width="82" height="164.9" rx="7" fill="#2E7D5B"/>
<text x="559.0" y="460.1" text-anchor="middle" font-size="13" font-weight="900" fill="#111827">33.7%</text>
<text x="512" y="667" font-size="12" fill="#475569">
<tspan x="512" dy="0">7-day inflow</tspan>
</text>
<rect x="643" y="385.0" width="82" height="250.0" rx="7" fill="#9673A6"/>
<text x="684.0" y="375.0" text-anchor="middle" font-size="13" font-weight="900" fill="#111827">51.1%</text>
<text x="637" y="667" font-size="12" fill="#475569">
<tspan x="637" dy="0">turbidity</tspan>
</text>
<line x1="105" y1="576.8" x2="825" y2="576.8" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 7"/>
<text x="699" y="568.8" font-size="12" fill="#64748b">ordinary 11.9%</text>
<rect x="890" y="260" width="235" height="126" rx="10" fill="#f8fafc" stroke="#d7dde8"/>
<text x="908" y="292" font-size="13" font-weight="800" fill="#64748b">Scenario rate</text>
<text x="908" y="336" font-size="28" font-weight="900" fill="#2E7D5B">39.3%</text>
<text x="908" y="362" font-size="12" fill="#64748b">
<tspan x="908" dy="0">combined rainfall/inflow</tspan>
<tspan x="908" dy="17">condition</tspan>
</text>
<rect x="1150" y="260" width="235" height="126" rx="10" fill="#f8fafc" stroke="#d7dde8"/>
<text x="1168" y="292" font-size="13" font-weight="800" fill="#64748b">Risk Ratio</text>
<text x="1168" y="336" font-size="28" font-weight="900" fill="#2E7D5B">3.31x</text>
<text x="1168" y="362" font-size="12" fill="#64748b">
<tspan x="1168" dy="0">p=1.05e-36</tspan>
</text>
<text x="890" y="470" font-size="18" font-weight="900" fill="#111827">Why this graph fits H2</text>
<text x="890" y="504" font-size="15" fill="#334155">
<tspan x="890" dy="0">The bars separate 3, 7, and 14 day rainfall windows,</tspan>
<tspan x="890" dy="21">matching the hypothesis that runoff and nutrients can</tspan>
<tspan x="890" dy="21">affect cyanobacteria with a lag.</tspan>
</text>
</svg>