<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
<rect width="1500" height="860" fill="#f5f7fb"/>
<style>text{font-family:Inter,Segoe UI,Arial,sans-serif}</style>
<text x="54" y="58" font-size="30" font-weight="800" fill="#111827">H3. Spatial risk transfer</text>
<text x="54" y="88" font-size="15" fill="#64748b">Leading signal from one monitoring area to another.</text>
<rect x="56" y="120" width="1388" height="660" rx="14" fill="#ffffff" stroke="#d7dde8"/>
<rect x="56" y="120" width="12" height="660" rx="6" fill="#2E7D5B"/>
<rect x="96" y="150" width="150" height="38" rx="19" fill="#2E7D5B" fill-opacity="0.14"/>
<text x="171" y="175" text-anchor="middle" font-size="14" font-weight="900" fill="#2E7D5B">Supported</text>
<text x="96" y="215" font-size="15" fill="#334155">
<tspan x="96" dy="0">This scenario checks whether an earlier risk signal in one</tspan>
<tspan x="96" dy="21">water area works as a warning for other areas.</tspan>
</text>
<text x="96" y="300" font-size="18" font-weight="900" fill="#111827">Monitoring-area signal flow</text>
<line x1="322" y1="410" x2="528" y2="410" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
<path d="M 518 396 L 542 410 L 518 424 Z" fill="#94a3b8"/>
<line x1="652" y1="410" x2="858" y2="410" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
<path d="M 848 396 L 872 410 L 848 424 Z" fill="#94a3b8"/>
<circle cx="260" cy="410" r="66" fill="#2E7D5B" fill-opacity="0.14" stroke="#2E7D5B" stroke-width="3"/>
<text x="260" y="416" text-anchor="middle" font-size="18" font-weight="900" fill="#111827">Munui</text>
<circle cx="590" cy="410" r="66" fill="#2E7D5B" fill-opacity="0.14" stroke="#2E7D5B" stroke-width="3"/>
<text x="590" y="416" text-anchor="middle" font-size="18" font-weight="900" fill="#111827">Chudong</text>
<circle cx="920" cy="410" r="66" fill="#2E7D5B" fill-opacity="0.14" stroke="#2E7D5B" stroke-width="3"/>
<text x="920" y="416" text-anchor="middle" font-size="18" font-weight="900" fill="#111827">Hoenam</text>
<rect x="190" y="530" width="810" height="64" rx="10" fill="#f8fafc" stroke="#d7dde8"/>
<text x="595" y="570" text-anchor="middle" font-size="17" font-weight="900" fill="#2E7D5B">leading cells / alert signal -> next-area risk</text>
<rect x="1085" y="255" width="245" height="126" rx="10" fill="#f8fafc" stroke="#d7dde8"/>
<text x="1103" y="287" font-size="13" font-weight="800" fill="#64748b">Signal period</text>
<text x="1103" y="331" font-size="28" font-weight="900" fill="#2E7D5B">61.4%</text>
<text x="1103" y="357" font-size="12" fill="#64748b">
<tspan x="1103" dy="0">ordinary 8.5%</tspan>
</text>
<rect x="1085" y="410" width="245" height="126" rx="10" fill="#f8fafc" stroke="#d7dde8"/>
<text x="1103" y="442" font-size="13" font-weight="800" fill="#64748b">Risk Ratio</text>
<text x="1103" y="486" font-size="28" font-weight="900" fill="#2E7D5B">7.25x</text>
<text x="1103" y="512" font-size="12" fill="#64748b">
<tspan x="1103" dy="0">p=2.55e-101</tspan>
</text>
<text x="1085" y="610" font-size="18" font-weight="900" fill="#111827">Use in operation</text>
<text x="1085" y="642" font-size="14" fill="#334155">
<tspan x="1085" dy="0">When one area shows a leading bloom</tspan>
<tspan x="1085" dy="20">signal, monitoring should expand to</tspan>
<tspan x="1085" dy="20">adjacent or downstream areas before</tspan>
<tspan x="1085" dy="20">the next sampling point.</tspan>
</text>
</svg>